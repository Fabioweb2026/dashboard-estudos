<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista de Tarefas Pro</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://jsdelivr.net">

    <style>
        body {
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border-radius: 20px;
            border: none;
        }
        .concluida {
            text-decoration: line-through;
            opacity: 0.5;
        }
        .item-tarefa {
            transition: 0.2s;
            cursor: pointer;
            border-bottom: 1px solid #eee !important;
        }
        .item-tarefa:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card shadow-lg p-4">
                <h2 class="text-center mb-4">Tarefas 📝</h2>
                
                <!-- Entrada de Tarefa -->
                <div class="input-group mb-3">
                    <input type="text" id="tarefa" class="form-control" placeholder="O que precisa fazer?">
                    <button class="btn btn-primary" onclick="adicionar()">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>

                <!-- Lista -->
                <ul id="lista" class="list-group list-group-flush">
                    <!-- Itens aparecem aqui -->
                </ul>

                <!-- Botão Limpar (Opcional) -->
                <button class="btn btn-sm btn-link text-muted mt-3" onclick="limparTudo()">Limpar lista</button>
            </div>

        </div>
    </div>
</div>

<script>
    // Carregar dados ao abrir a página
    window.onload = () => {
        const salvas = JSON.parse(localStorage.getItem("tarefas_v1")) || [];
        salvas.forEach(t => criarElemento(t.texto, t.feita));
    };

    function adicionar() {
        const input = document.getElementById("tarefa");
        const texto = input.value.trim();
        
        if (texto !== "") {
            criarElemento(texto, false);
            salvar();
            input.value = "";
            input.focus();
        }
    }

    function criarElemento(texto, feita) {
        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center item-tarefa px-0";
        
        const classeFeita = feita ? "concluida" : "";

        li.innerHTML = `
            <span onclick="alternar(this)" class="flex-grow-1 ${classeFeita}">${texto}</span>
            <button class="btn btn-link text-danger p-0" onclick="remover(this)">
                <i class="bi bi-trash3"></i>
            </button>
        `;
        document.getElementById("lista").appendChild(li);
    }

    function remover(botao) {
        botao.parentElement.remove();
        salvar();
    }

    function alternar(span) {
        span.classList.toggle("concluida");
        salvar();
    }

    function salvar() {
        const todos = [];
        document.querySelectorAll("#lista li").forEach(li => {
            todos.push({
                texto: li.querySelector("span").innerText,
                feita: li.querySelector("span").classList.contains("concluida")
            });
        });
        localStorage.setItem("tarefas_v1", JSON.stringify(todos));
    }

    function limparTudo() {
        if(confirm("Deseja apagar todas as tarefas?")) {
            document.getElementById("lista").innerHTML = "";
            localStorage.removeItem("tarefas_v1");
        }
    }

    // Adicionar com a tecla Enter
    document.getElementById("tarefa").addEventListener("keypress", (e) => {
        if (e.key === "Enter") adicionar();
    });
</script>

</body>
</html>
